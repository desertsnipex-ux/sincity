<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Password | SinCity</title>
  <link rel="icon" href="assets/emblem-hero.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
    .auth-card { background: var(--panel-strong); border: 1px solid var(--line); border-radius: var(--radius); padding: 3rem; max-width: 450px; width: 100%; text-align: center; box-shadow: var(--shadow); position: relative; overflow: hidden; backdrop-filter: blur(10px); }
    .auth-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #90ff5f, transparent); }
    .auth-title { font-family: var(--headline); font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: -1px; }
    .auth-subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }
    
    .form-group { margin-bottom: 1.2rem; text-align: left; }
    .form-label { display: block; font-size: 0.7rem; color: var(--glow); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--line-soft); border-radius: 8px; padding: 0.8rem; color: white; outline: none; transition: border-color 0.3s; }
    .form-input:focus { border-color: var(--glow); }
    
    .btn-submit { width: 100%; padding: 1rem; border-radius: 8px; border: none; background: var(--glow); color: black; font-weight: bold; cursor: pointer; font-family: var(--display); transition: transform 0.2s; margin-top: 1rem; }
    .btn-submit:hover { transform: scale(1.02); }
    
    .message-box { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 0.85rem; }
    .error { background: rgba(255, 95, 95, 0.1); color: #ff5f5f; border: 1px solid #ff5f5f; }
  </style>
</head>
<body data-page="auth">
  <div class="page-shell">
    <div class="ambient-backdrop"></div>
    <div class="ambient-grid"></div>
    <div class="scanlines"></div>

    <div class="auth-container">
      <div class="auth-card reveal visible">
        <h1 class="auth-title">NEW PASSWORD</h1>
        <p class="auth-subtitle">Establish a new password for your record.</p>

        <div id="status-message" class="message-box error"></div>

        <form id="reset-form">
          <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="8">
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" id="confirm-password" class="form-input" placeholder="••••••••" required minlength="8">
          </div>
          <button type="submit" class="btn-submit">Update Record</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('status-message').textContent = 'Invalid access: Token missing.';
      document.getElementById('status-message').style.display = 'block';
      document.getElementById('reset-form').style.display = 'none';
    }

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pass = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;
      const statusBox = document.getElementById('status-message');
      statusBox.style.display = 'none';

      if (pass !== confirm) {
        statusBox.textContent = 'Passwords do not match.';
        statusBox.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pass })
        });
        const data = await res.json();

        if (data.ok) {
          alert('Password updated successfully. Redirecting to entry portal.');
          window.location.href = '/login';
        } else {
          statusBox.textContent = data.error || 'Failed to update password.';
          statusBox.style.display = 'block';
        }
      } catch (err) {
        statusBox.textContent = 'Connection error.';
        statusBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
