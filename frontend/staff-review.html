<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Review Dashboard | SinCity</title>
  <link rel="icon" href="assets/emblem-hero.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .dashboard-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .dashboard-title {
      font-size: 3rem;
      color: var(--glow);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(142, 255, 105, 0.5);
    }

    .dashboard-subtitle {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .applications-grid {
      display: grid;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .application-card {
      background: linear-gradient(145deg, var(--panel-strong), var(--bg-deep));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 2rem;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .application-card:hover {
      border-color: var(--glow);
      box-shadow: 0 0 30px rgba(142, 255, 105, 0.1);
    }

    .application-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--glow), transparent);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    .application-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }

    .applicant-info {
      flex: 1;
    }

    .applicant-name {
      font-size: 1.5rem;
      color: var(--glow);
      margin-bottom: 0.5rem;
      font-family: var(--display);
    }

    .applicant-details {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .application-status {
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .status-pending {
      background: rgba(255, 193, 7, 0.2);
      color: #ffc107;
      border: 1px solid #ffc107;
    }

    .status-approved {
      background: rgba(40, 167, 69, 0.2);
      color: #28a745;
      border: 1px solid #28a745;
    }

    .status-denied {
      background: rgba(220, 53, 69, 0.2);
      color: #dc3545;
      border: 1px solid #dc3545;
    }

    .application-content {
      margin-bottom: 2rem;
    }

    .content-section {
      margin-bottom: 1.5rem;
    }

    .content-label {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      display: block;
    }

    .content-value {
      color: white;
      font-size: 1rem;
      line-height: 1.6;
    }

    .application-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    .action-button {
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.9rem;
    }

    .approve-button {
      background: var(--glow);
      color: var(--bg);
    }

    .approve-button:hover {
      background: #7fff00;
      box-shadow: 0 0 20px rgba(127, 255, 0, 0.5);
    }

    .deny-button {
      background: transparent;
      color: #ff5f5f;
      border: 1px solid #ff5f5f;
    }

    .deny-button:hover {
      background: rgba(255, 95, 95, 0.1);
      box-shadow: 0 0 20px rgba(255, 95, 95, 0.3);
    }

    .loading-spinner {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    .empty-state {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
    }

    .empty-state h3 {
      color: var(--glow);
      margin-bottom: 1rem;
    }

    .filter-tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 1rem;
    }

    .filter-tab {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--muted);
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-tab.active {
      background: var(--glow);
      color: var(--bg);
      border-color: var(--glow);
    }

    .filter-tab:hover:not(.active) {
      border-color: var(--glow);
      color: var(--glow);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--glow);
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body data-page="staff-review">
  <div class="page-shell">
    <div class="ambient-backdrop"></div>
    <div class="ambient-grid"></div>
    <canvas id="particle-field"></canvas>
    <div class="scanlines"></div>

    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html#home" aria-label="SinCity home">
          <div class="brand-mark">
            <img src="assets/emblem-hero.png" alt="SinCity emblem">
          </div>
          <div class="brand-copy">
            <div class="brand-name" id="brand-name">SinCity</div>
            <div class="brand-tag" id="brand-tag">By Enact</div>
          </div>
        </a>

        <nav class="nav-links" id="nav-links" aria-label="Primary"></nav>

        <div class="header-actions"></div>
      </div>
    </header>

    <main class="section" style="display: flex; justify-content: center; align-items: flex-start; padding: 2rem 0;">
      <div class="section-frame">
        <div class="dashboard-container">
          <div class="dashboard-header">
            <h1 class="dashboard-title">STAFF REVIEW DASHBOARD</h1>
            <p class="dashboard-subtitle">Whitelist Application Management System</p>
          </div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-value" id="total-applications">0</div>
              <div class="stat-label">Total Applications</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="pending-applications">0</div>
              <div class="stat-label">Pending Review</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="approved-applications">0</div>
              <div class="stat-label">Approved</div>
            </div>
            <div class="stat-card">
              <div class="stat-value" id="denied-applications">0</div>
              <div class="stat-label">Denied</div>
            </div>
          </div>

          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All Applications</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
            <button class="filter-tab" data-filter="approved">Approved</button>
            <button class="filter-tab" data-filter="denied">Denied</button>
          </div>

          <div id="applications-container">
            <div class="loading-spinner">
              <div>Loading applications...</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let applications = [];
    let currentFilter = 'all';

    // Check admin access
    async function checkAdminAccess() {
      try {
        const res = await fetch('/api/me');
        const data = await res.json();
        
        if (!data.authenticated || (data.user.role !== 'admin' && data.user.role !== 'mod')) {
          window.location.href = '/login';
          return false;
        }
        
        return data.user;
      } catch (err) {
        console.error('Admin check failed:', err);
        window.location.href = '/login';
        return false;
      }
    }

    // Load applications
    async function loadApplications() {
      try {
        const res = await fetch('/api/applications');
        const data = await res.json();
        
        if (data.ok) {
          applications = data.applications;
          renderApplications();
          updateStats();
        } else {
          console.error('Failed to load applications:', data.error);
        }
      } catch (err) {
        console.error('Error loading applications:', err);
      }
    }

    // Render applications
    function renderApplications() {
      const container = document.getElementById('applications-container');
      const filteredApps = filterApplications(applications, currentFilter);
      
      if (filteredApps.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No Applications Found</h3>
            <p>There are no ${currentFilter === 'all' ? '' : currentFilter} applications to review.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="applications-grid">
          ${filteredApps.map(app => createApplicationCard(app)).join('')}
        </div>
      `;
    }

    // Create application card HTML
    function createApplicationCard(app) {
      const statusClass = `status-${app.status}`;
      const createdAt = new Date(app.createdAt).toLocaleDateString();
      
      return `
        <div class="application-card" data-id="${app.id}">
          <div class="application-header">
            <div class="applicant-info">
              <div class="applicant-name">${app.displayName}</div>
              <div class="applicant-details">
                <div>Discord: ${app.discord || 'Not provided'}</div>
                <div>Character Age: ${app.characterAge}</div>
                <div>Timezone: ${app.timezone}</div>
                <div>Submitted: ${createdAt}</div>
              </div>
            </div>
            <div class="application-status ${statusClass}">${app.status}</div>
          </div>
          
          <div class="application-content">
            <div class="content-section">
              <span class="content-label">Playstyle</span>
              <div class="content-value">${app.playstyle}</div>
            </div>
            
            <div class="content-section">
              <span class="content-label">Experience</span>
              <div class="content-value">${app.hours}</div>
            </div>
            
            <div class="content-section">
              <span class="content-label">Character Concept</span>
              <div class="content-value">${app.concept}</div>
            </div>
            
            <div class="content-section">
              <span class="content-label">Availability</span>
              <div class="content-value">${app.availability}</div>
            </div>
            
            ${app.notes ? `
              <div class="content-section">
                <span class="content-label">Additional Notes</span>
                <div class="content-value">${app.notes}</div>
              </div>
            ` : ''}
          </div>
          
          ${app.status === 'pending' ? `
            <div class="application-actions">
              <button class="action-button approve-button" onclick="handleApplication('${app.id}', 'approve')">
                Approve
              </button>
              <button class="action-button deny-button" onclick="handleApplication('${app.id}', 'deny')">
                Deny
              </button>
            </div>
          ` : ''}
        </div>
      `;
    }

    // Filter applications
    function filterApplications(apps, filter) {
      if (filter === 'all') return apps;
      return apps.filter(app => app.status === filter);
    }

    // Update statistics
    function updateStats() {
      const stats = {
        total: applications.length,
        pending: applications.filter(app => app.status === 'pending').length,
        approved: applications.filter(app => app.status === 'approved').length,
        denied: applications.filter(app => app.status === 'denied').length
      };

      document.getElementById('total-applications').textContent = stats.total;
      document.getElementById('pending-applications').textContent = stats.pending;
      document.getElementById('approved-applications').textContent = stats.approved;
      document.getElementById('denied-applications').textContent = stats.denied;
    }

    // Handle application approval/denial
    async function handleApplication(appId, action) {
      if (!confirm(`Are you sure you want to ${action} this application?`)) {
        return;
      }

      try {
        const res = await fetch(`/api/applications/${appId}/${action}`, {
          method: 'POST'
        });

        const data = await res.json();

        if (data.ok) {
          alert(`Application ${action}d successfully!`);
          loadApplications(); // Refresh the list
        } else {
          alert(`Failed to ${action} application: ${data.error}`);
        }
      } catch (err) {
        console.error(`Error ${action}ing application:`, err);
        alert(`An error occurred while ${action}ing the application.`);
      }
    }

    // Filter tab handlers
    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        currentFilter = this.dataset.filter;
        renderApplications();
      });
    });

    // Initialize dashboard
    async function initDashboard() {
      const user = await checkAdminAccess();
      if (user) {
        // Render navigation
        const nav = document.getElementById('nav-links');
        if (nav) {
          const links = [
            { label: 'Home', href: 'index.html#home' },
            { label: 'Apply', href: 'apply.html#apply' },
            { label: 'Rules', href: 'rules.html' },
            { label: 'Team', href: 'team.html' },
            { label: 'Store', href: 'store.html' }
          ];
          nav.innerHTML = links.map(l => `<a href="${l.href}" class="nav-link">${l.label}</a>`).join('');
        }

        // Render header actions
        const headerActions = document.querySelector('.header-actions');
        if (headerActions) {
          headerActions.innerHTML = `<a href="/auth/logout" class="ghost-button" style="display: flex; align-items: center; justify-content: center;">Logout</a>`;
        }

        // Load applications
        await loadApplications();
      }
    }

    // Start the dashboard
    initDashboard();
  </script>
</body>
</html>
