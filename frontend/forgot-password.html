<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | SinCity</title>
  <link rel="icon" href="assets/emblem-hero.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem; }
    .auth-card { background: var(--panel-strong); border: 1px solid var(--line); border-radius: var(--radius); padding: 3rem; max-width: 450px; width: 100%; text-align: center; box-shadow: var(--shadow); position: relative; overflow: hidden; backdrop-filter: blur(10px); }
    .auth-card::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, #ff5f5f, transparent); }
    .auth-title { font-family: var(--headline); font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: -1px; color: #ff5f5f; }
    .auth-subtitle { color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }
    
    .form-group { margin-bottom: 1.2rem; text-align: left; }
    .form-label { display: block; font-size: 0.7rem; color: #ff5f5f; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .form-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--line-soft); border-radius: 8px; padding: 0.8rem; color: white; outline: none; transition: border-color 0.3s; }
    .form-input:focus { border-color: #ff5f5f; }
    
    .btn-submit { width: 100%; padding: 1rem; border-radius: 8px; border: none; background: #ff5f5f; color: white; font-weight: bold; cursor: pointer; font-family: var(--display); transition: transform 0.2s; margin-top: 1rem; }
    .btn-submit:hover { transform: scale(1.02); }
    
    .message-box { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; font-size: 0.85rem; }
    .error { background: rgba(255, 95, 95, 0.1); color: #ff5f5f; border: 1px solid #ff5f5f; }
    .success { background: rgba(144, 255, 95, 0.1); color: #90ff5f; border: 1px solid #90ff5f; }
  </style>
</head>
<body data-page="auth">
  <div class="page-shell">
    <div class="ambient-backdrop"></div>
    <div class="ambient-grid"></div>
    <div class="scanlines"></div>

    <div class="auth-container">
      <div class="auth-card reveal visible">
        <h1 class="auth-title">RECOVERY</h1>
        <p class="auth-subtitle">Request a reset link for your password.</p>

        <div id="status-message" class="message-box"></div>

        <form id="forgot-form">
          <div class="form-group">
            <label class="form-label">Verified Email</label>
            <input type="email" id="email" class="form-input" placeholder="email@example.com" required>
          </div>
          <button type="submit" class="btn-submit">Dispatch Reset Link</button>
        </form>
        
        <a href="/login" style="display: block; margin-top: 1.5rem; color: var(--muted); text-decoration: none; font-size: 0.8rem;">← Back to login</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const statusBox = document.getElementById('status-message');
      statusBox.style.display = 'none';

      try {
        const res = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value })
        });
        const data = await res.json();

        if (data.ok) {
          statusBox.textContent = 'A recovery link has been dispatched to your email.';
          statusBox.className = 'message-box success';
          statusBox.style.display = 'block';
        } else {
          statusBox.textContent = data.error || 'Failed to dispatch link.';
          statusBox.className = 'message-box error';
          statusBox.style.display = 'block';
        }
      } catch (err) {
        statusBox.textContent = 'Connection error.';
        statusBox.className = 'message-box error';
        statusBox.style.display = 'block';
      }
    });
  </script>
</body>
</html>
